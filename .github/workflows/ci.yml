name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Frontend install
        working-directory: frontend
        run: npm install

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Build
        run: cargo build --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

  build-linux:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.6.3-devel-ubuntu24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl build-essential pkg-config nodejs npm

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable -c clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Frontend install
        working-directory: frontend
        run: npm install

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Clippy (gpu + decklink)
        run: $HOME/.cargo/bin/cargo clippy --workspace --features gpu,decklink -- -D warnings

      - name: Test (gpu + decklink)
        run: $HOME/.cargo/bin/cargo test --workspace --features gpu,decklink

      - name: Build release (gpu + decklink)
        run: $HOME/.cargo/bin/cargo build --release --features gpu,decklink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: momo-linux-x86_64
          path: target/release/momo-app

  build-windows:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '12.6.3'
          method: network

      - uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Frontend install
        working-directory: frontend
        run: npm install

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Build release (gpu + decklink)
        run: cargo build --release --target x86_64-pc-windows-msvc --features gpu,decklink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: momo-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/momo-app.exe
